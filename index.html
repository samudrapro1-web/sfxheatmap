<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SFX Academic Signal</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">

  <div class="topbar">
    <h1>SFX ACADEMIC</h1>

    <select id="pairSelect">
      <option value="OANDA:XAUUSD">XAUUSD</option>
      <option value="OANDA:EURUSD">EURUSD</option>
      <option value="OANDA:GBPUSD">GBPUSD</option>
      <option value="OANDA:USDJPY">USDJPY</option>
      <option value="BINANCE:BTCUSDT">BTCUSDT</option>
    </select>
  </div>

  <div class="price-box">
    <div class="label">CURRENT PRICE</div>
    <div id="price">Loading...</div>
  </div>

  <div class="signal-box">

    <button class="call-btn" onclick="playSound()">
      CALL
    </button>

    <div class="middle-info">
      <h2 id="timer">00:00</h2>
      <p>Market Signal</p>
    </div>

    <button class="put-btn" onclick="playSound()">
      PUT
    </button>

  </div>

  <div class="percent-box">
    <div class="buy">
      BUY POWER
      <h2 id="buyPercent">50%</h2>
    </div>

    <div class="sell">
      SELL POWER
      <h2 id="sellPercent">50%</h2>
    </div>
  </div>

  <div id="tradingview_chart"></div>

</div>

<audio id="clickSound">
  <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
